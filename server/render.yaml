# render.yaml for secure chat relay server
services:
  - type: web
    name: chat-relay
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.16
      - key: RENDER_INSTANCE_TYPE
        value: free
    sslCert: AUTO